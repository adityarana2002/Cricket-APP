  <path d="M 200 100 Q 100 100 100 256 Q 100 412 200 412 L 220 412 Q 130 412 130 256 Q 130 100 220 100 Z" fill="#003D82" opacity="0.9"/>
  
  <!-- Inner C highlight -->
  <path d="M 220 110 Q 135 110 135 256 Q 135 402 220 402 L 235 402 Q 145 402 145 256 Q 145 110 235 110 Z" fill="#0052A3" opacity="0.7"/>
  
  <!-- Cricket Ball -->
  <circle cx="300" cy="200" r="80" fill="#003D82" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Ball stitching lines (gold) -->
  <path d="M 260 200 Q 280 160 320 160 Q 340 180 340 200" stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 260 200 Q 280 240 320 240 Q 340 220 340 200" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 240 180 L 360 220" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Motion lines from ball (gold) -->
  <path d="M 360 160 Q 400 140 440 120" stroke="#D4AF37" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 370 190 Q 415 175 460 160" stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 360 240 Q 400 260 440 280" stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
