<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Branding & SEO -->
    <title>CricMax - Master the Game of Cricket</title>
    <meta name="description" content="CricMax: Live cricket scoring, match management and statistics. Score your local matches in real time." />
    <meta name="theme-color" content="#003D82" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CricMax" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CricMax" />

    <!-- Splash screen color on Android -->
    <meta name="msapplication-TileColor" content="#0f172a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CricMax - Master the Game of Cricket" />
    <meta property="og:description" content="Live cricket scoring and match management" />
    <meta property="og:site_name" content="CricMax" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon (inline SVG) -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Register service worker for PWA install support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
</body>
</html>
