# Production profile — activated by SPRING_PROFILES_ACTIVE=prod on Render
# All sensitive values come from environment variables set in the Render dashboard

# Database — Aiven MySQL (SSL required)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET}

# Logging — quieter in production
logging.level.root=WARN
logging.level.com.cricketapp=INFO

# Hide internal error details from API responses
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
